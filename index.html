<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="app" class="app">
            <div class="app-header">
                <button id="loadBtn">Load User</button>
                <div class="err" id="err"></div>
                <div class="sort-container">
                    <input type="text" id="search-name" placeholder="Search user by name..." />
                    <input type="text" id="search-email" placeholder="Search user by email..." />
                    <button id="reset-filters">Reset Filter</button>
                    <label for="sort-selector">Sort by name:</label>
                    <select id="sort-selector">
                        <option value="default">Default</option>
                        <option value="name-asc">A → Z</option>
                        <option value="name-desc">Z → A</option>
                    </select>
                </div>
                <p id="status"></p>
                <p id="state"></p>
            </div>
            <div class="user-grid" id="userGrid">
                <div id="user"></div>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
